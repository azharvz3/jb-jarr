  <style>
    * {margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

    body {
      background: radial-gradient(circle at top,#020617,#0f172a);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      overflow:hidden;
      opacity:0;
      transition:1s;
    }

    body.loaded {opacity:1;}

    /* BACKGROUND ANIMASI */
    body::before{
      content:"";
      position:absolute;
      width:200%;height:200%;
      background:repeating-linear-gradient(45deg,rgba(0,255,255,0.05) 0px,rgba(0,255,255,0.05) 2px,transparent 2px,transparent 40px);
      animation:moveBg 12s linear infinite;
    }

    @keyframes moveBg{
      0%{transform:translate(0,0);}100%{transform:translate(-200px,-200px);} }

    /* PLAYER */
    .player{
      position:absolute;
      width:110px;
      animation:float 6s ease-in-out infinite;
      filter:drop-shadow(0 0 15px cyan);
    }

    .messi{top:8%;left:25%;}
    .ronaldo{top:8%;left:65%;animation-delay:2s;}

    @keyframes float{
      0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);} }

    /* CONTAINER */
    .container{
      position:relative;
      text-align:center;
      background:rgba(255,255,255,0.05);
      padding:30px;
      border-radius:20px;
      backdrop-filter:blur(12px);
      box-shadow:0 0 25px rgba(0,255,255,0.3);
      width:340px;
      z-index:2;
    }

    .badge{
      font-size:11px;
      background:linear-gradient(135deg,#00ffff,#2563eb);
      padding:6px 12px;
      border-radius:10px;
      margin-bottom:12px;
      display:inline-block;
      box-shadow:0 0 10px cyan;
    }

    .profile-img{
      width:95px;height:95px;border-radius:50%;
      margin-bottom:15px;border:3px solid white;
      box-shadow:0 0 15px cyan;
    }

    h1{font-size:22px;margin-bottom:5px;}

    p{font-size:13px;color:#cbd5f5;margin-bottom:15px;}

    /* TRUST BOX */
    .trust{
      font-size:12px;
      margin-bottom:15px;
      color:#67e8f9;
    }

    /* PRICE BOX */
    .price-box{
      background:rgba(0,255,255,0.1);
      padding:10px;
      border-radius:10px;
      margin-bottom:15px;
      font-size:12px;
    }

    /* BUTTON */
    .link{
      display:block;
      text-decoration:none;
      color:white;
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      padding:12px;border-radius:12px;
      margin-bottom:12px;
      position:relative;overflow:hidden;
      transition:0.3s;
    }

    .link:hover{
      transform:scale(1.07);
      background:linear-gradient(135deg,#00ffff,#2563eb);
      box-shadow:0 0 15px cyan;
    }

    .link::after{
      content:"";
      position:absolute;width:100%;height:100%;
      background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
      top:0;left:-100%;transition:0.5s;
    }

    .link:hover::after{left:100%;}

    .footer{
      margin-top:15px;font-size:11px;color:#94a3b8;
    }

  </style>
</head>
